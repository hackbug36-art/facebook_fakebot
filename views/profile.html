<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - Facebook</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-left">
      <a href="/" class="logo">facebook</a>
    </div>
    <div class="navbar-center">
      <input type="text" class="search-bar" placeholder="Cari di Facebook">
    </div>
    <div class="navbar-right">
      <a href="/" class="nav-item" title="Beranda">🏠</a>
      <a href="#" class="nav-item" title="Watch">🎬</a>
      <a href="#" class="nav-item" title="Marketplace">🏪</a>
      <a href="#" class="nav-item" title="Grup">👥</a>
      <a href="#" class="nav-item" title="Gaming">🎮</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Tema">🌙</button>
      <a href="/bug-bounty" class="nav-item" title="Bug Bounty" style="font-size:14px;">🐛</a>
      <div id="authSection">
        <a href="/login" class="nav-item" title="Masuk">👤</a>
      </div>
      <div id="userSection" class="d-none">
        <a href="/profile.html" class="nav-item" title="Profil">
          <img id="navAvatar" src="" class="nav-avatar" alt="">
        </a>
        <button class="nav-item" onclick="logout()" title="Keluar">🚪</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top:80px;">
    <div class="main-content" style="max-width:900px;margin:0 auto;flex:none;">
      <div class="card profile-header">
        <div class="profile-cover"></div>
        <div class="profile-info">
          <img id="profileAvatar" src="" class="profile-avatar-large" alt="">
          <div class="profile-name" id="profileName"></div>
          <div class="profile-bio" id="profileBio"></div>
          <div id="profileActions" style="margin-top:12px;"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Postingan</div>
        <div id="profilePosts"></div>
      </div>
    </div>
  </div>

  <div class="mobile-nav">
    <button class="mobile-nav-item active" onclick="window.location.href='/'">
      <span>🏠</span>
      <span>Beranda</span>
    </button>
    <button class="mobile-nav-item" onclick="window.location.href='/bug-bounty'">
      <span>🐛</span>
      <span>Bug Bounty</span>
    </button>
    <button class="mobile-nav-item" onclick="openCreateModal()">
      <span>➕</span>
      <span>Posting</span>
    </button>
    <button class="mobile-nav-item" onclick="alert('Fitur segera hadir')">
      <span>💬</span>
      <span>Pesan</span>
    </button>
    <button class="mobile-nav-item" onclick="window.location.href='/profile.html'">
      <span>👤</span>
      <span>Profil</span>
    </button>
  </div>

  <script src="/js/app.js"></script>
  <script>
    setTheme(getTheme());

    async function loadProfile() {
      try {
        const data = await api('/api/auth/me');
        const user = data.user;
        window.location.href = `/u/${user.username}`;
      } catch {
        window.location.href = '/login';
      }
    }

    async function init() {
      await checkAuth();
      if (!currentUser) {
        window.location.href = '/login';
        return;
      }
      loadProfile();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
