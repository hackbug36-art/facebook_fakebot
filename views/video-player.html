<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video - Facebook</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .video-player {
      width: 100%;
      display: block;
      max-height: 600px;
    }
    .video-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      cursor: pointer;
    }
    .play-button {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      transition: transform 0.2s;
    }
    .play-button:hover { transform: scale(1.1); }
    .video-info {
      padding: 16px;
      background: var(--fb-card-bg);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .video-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .video-meta {
      display: flex;
      gap: 16px;
      color: var(--fb-text-secondary);
      font-size: 14px;
    }
    .video-stats {
      display: flex;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--fb-border);
      margin-bottom: 12px;
    }
    .video-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--fb-text-secondary);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-left">
      <a href="/" class="logo">facebook</a>
    </div>
    <div class="navbar-center">
      <input type="text" class="search-bar" placeholder="Cari video...">
    </div>
    <div class="navbar-right">
      <a href="/" class="nav-item" title="Beranda">🏠</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Tema">🌙</button>
      <div id="authSection">
        <a href="/login" class="nav-item" title="Masuk">👤</a>
      </div>
      <div id="userSection" class="d-none">
        <a href="/profile.html" class="nav-item" title="Profil">
          <img id="navAvatar" src="" class="nav-avatar" alt="">
        </a>
        <button class="nav-item" onclick="logout()" title="Keluar">🚪</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top:80px;">
    <div class="main-content" style="max-width:800px;margin:0 auto;flex:none;">
      <div id="videoPlayerContainer"></div>
      
      <div class="card">
        <div class="card-header">Video Lainnya</div>
        <div id="relatedVideos" style="padding:16px;"></div>
      </div>
    </div>
  </div>

  <div class="mobile-nav">
    <button class="mobile-nav-item active" onclick="window.location.href='/'">
      <span>🏠</span>
      <span>Beranda</span>
    </button>
    <button class="mobile-nav-item" onclick="window.location.href='/bug-bounty'">
      <span>🐛</span>
      <span>Bug Bounty</span>
    </button>
    <button class="mobile-nav-item" onclick="openCreateModal()">
      <span>➕</span>
      <span>Posting</span>
    </button>
    <button class="mobile-nav-item" onclick="alert('Fitur segera hadir')">
      <span>💬</span>
      <span>Pesan</span>
    </button>
    <button class="mobile-nav-item" onclick="window.location.href='/profile.html'">
      <span>👤</span>
      <span>Profil</span>
    </button>
  </div>

  <script src="/js/app.js"></script>
  <script src="/engine/public/js/engine.js"></script>
  <script>
    setTheme(getTheme());
    
    async function loadVideo(videoId) {
      const container = document.getElementById('videoPlayerContainer');
      const relatedContainer = document.getElementById('relatedVideos');
      
      try {
        const videos = await EngineAPI.get('/api/engine/media/videos');
        const video = videos.videos.find(v => v.id === videoId);
        
        if (!video) {
          container.innerHTML = '<div class="card"><div style="padding:40px;text-align:center;color:#f3425f;">Video tidak ditemukan</div></div>';
          return;
        }

        const author = await EngineAPI.get(`/api/users/${video.userId}`);
        
        container.innerHTML = `
          <div class="card">
            <div class="video-container">
              <video class="video-player" id="mainVideo" controls poster="${video.thumbnail}" preload="metadata">
                <source src="${video.url}" type="video/mp4">
                Browser anda tidak menyokong video.
              </video>
            </div>
            <div class="video-info">
              <div class="video-title">${escapeHtml(video.title)}</div>
              <div class="video-meta">
                <span>${video.views || 0} tontonan</span>
                <span>${video.duration || '0:00'}</span>
                <span>${formatTime(video.createdAt)}</span>
              </div>
              <div class="video-stats">
                <div class="video-stat">👍 ${Math.floor(Math.random() * 500) + 50}</div>
                <div class="video-stat">💬 ${Math.floor(Math.random() * 100) + 10}</div>
                <div class="video-stat">↗️ Bagikan</div>
              </div>
            </div>
          </div>
        `;

        const related = videos.videos.filter(v => v.id !== videoId).slice(0, 5);
        if (related.length) {
          relatedContainer.innerHTML = related.map(v => `
            <div class="sidebar-item" style="padding:8px 0;cursor:pointer;" onclick="window.location.href='/videos/${v.id}'">
              <div style="width:160px;height:90px;background:#000;border-radius:8px;overflow:hidden;flex-shrink:0;position:relative;">
                <img src="${v.thumbnail}" style="width:100%;height:100%;object-fit:cover;opacity:0.8;" alt="">
                <div style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.8);color:white;padding:2px 6px;border-radius:4px;font-size:11px;">${v.duration || '0:00'}</div>
              </div>
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;margin-bottom:4px;">${escapeHtml(v.title)}</div>
                <div style="font-size:13px;color:var(--fb-text-secondary);">${v.views || 0} tontonan</div>
              </div>
            </div>
          `).join('');
        } else {
          relatedContainer.innerHTML = '<div style="text-align:center;color:#65676b;padding:20px;">Tiada video lain</div>';
        }
      } catch (err) {
        container.innerHTML = `<div class="card"><div style="padding:40px;text-align:center;color:#f3425f;">Gagal memuat: ${err.message}</div></div>`;
      }
    }

    async function init() {
      await checkAuth();
      if (!currentUser) {
        window.location.href = '/login';
        return;
      }
      
      const pathParts = window.location.pathname.split('/');
      const videoId = pathParts[2];
      if (videoId) {
        loadVideo(videoId);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
