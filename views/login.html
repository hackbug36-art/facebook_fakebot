<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Facebook</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">facebook</div>
      <div class="auth-title">Masuk ke Facebook</div>
      <div class="auth-subtitle">Terhubung dengan teman dan dunia di sekitar Anda.</div>
      <div id="loginError" class="error-msg"></div>
      <div id="fileWarning" class="error-msg" style="display:none;background:#fff3cd;color:#856404;">
        Anda membuka halaman ini sebagai fail (file://). Sila buka melalui pelayan di <a href="http://localhost:8080/login" style="color:#0866FF;font-weight:600;">http://localhost:8080/login</a>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" required placeholder="Username Anda">
        </div>
        <div class="form-group">
          <label>Kata Sandi</label>
          <input type="password" id="loginPassword" required placeholder="Kata sandi Anda">
        </div>
        <button type="submit" class="btn btn-primary">Masuk</button>
      </form>
      <div class="auth-footer">
        Belum punya akun? <a href="/register">Daftar</a>
      </div>
      <div style="margin-top:16px;padding:12px;background:#f0f2f5;border-radius:8px;font-size:13px;color:#65676b;">
        <strong>Demo Account:</strong><br>
        Username: <code>admin</code><br>
        Password: <code>admin</code>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    setTheme(getTheme());
    if (window.location.protocol === 'file:') {
      document.getElementById('fileWarning').style.display = 'block';
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('loginError');
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
          }
        });
        currentUser = data.user;
        window.location.href = '/';
      } catch (err) {
        showError('loginError', err.message);
      }
    });
  </script>
</body>
</html>
